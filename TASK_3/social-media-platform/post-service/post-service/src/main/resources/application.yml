server:
  port: 8082

spring:
  application:
    name: post-service

  datasource:
    url: jdbc:mysql://localhost:3306/social
    username: root
    password: "your_sql_password"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka